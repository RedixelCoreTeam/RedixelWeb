<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Redixel">
  <defs>
    <radialGradient id="bg" cx="32" cy="28" r="34" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22161b" />
      <stop offset="1" stop-color="#0f0a0d" />
    </radialGradient>

    <linearGradient id="letter" x1="32" y1="12" x2="32" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffd8d2" />
      <stop offset="0.45" stop-color="#f2b0a6" />
      <stop offset="1" stop-color="#d9867c" />
    </linearGradient>

    <filter id="letter-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4" result="blur" />
      <feColorMatrix
        in="blur"
        type="matrix"
        values="1 0 0 0 0  0 0.2 0 0 0  0 0 0.2 0 0  0 0 0 0.45 0"
        result="glow"
      />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <clipPath id="letter-clip">
